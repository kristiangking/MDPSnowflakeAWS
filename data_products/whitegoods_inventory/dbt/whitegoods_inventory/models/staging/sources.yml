version: 2

sources:
  - name: inventory
    database: WHITEGOODS_RAW
    schema: inventory
    tables:
      - name: products
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 24, period: hour}
      - name: locations
      - name: suppliers
      - name: purchase_orders
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 24, period: hour}
      - name: purchase_order_lines
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 24, period: hour}
      - name: inventory_events
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 1, period: hour}
